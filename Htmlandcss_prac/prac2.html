<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="images/Image1.jpg">
    <title> My second web</title>
</head>
<body>

    <form action="file.txt" method="post" enctype="multipart/form-data">

        <label for="username"> Username: </label>
        <input type="text" id="username" placeholder="Username" name="username" minlength="6" maxlength="12" >
        <br>
        <label for="password"> Password: </label>
        <input type="password" id="password" placeholder="Password" name="password" minlength="6" maxlength="12">
        <br>
        <label for="email"> Email: </label>
        <input type="email" id="email" placeholder="Westondipo@gmail.com" name="email">
        <br>
        <label for="phone"> Phone: </label>
        <input type="tel" id="phone" placeholder="+44 07439 2342" name="phone" pattern="^\+?44\d{10}$" required>
        <br>
        <label for="title" style="font-style: calc();">Title</label>
        
        <label for="Mrs."> Mrs: </label>
        <input type="radio" id="Mrs" value="Mrs" name="title">
        <label for="Ms."> Ms: </label>
        <input type="radio" id="Ms" value="Ms" name="title">
        <label for="Dr."> Dr: </label>
        <input type="radio" id="Dr" value="Dr">
        <label for="Mr."> Mr: </label>
        <input type="radio" id="Mr" value="Mr">

        <br>
        <label for="payment"> Payment: </label>
        <select  id="payment">
            <option value="Visa"> Visa</option>
            <option value="Mastercard"> Mastercard</option>
            <option value="Giftcard"> Giftcard</option>
        </select>

        <br>
        <label for="subscribe"> Subscribe: </label>
        <input type="checkbox" id="subscribe">
        <br>
        <label for="comment"> Comment: </label>
        <textarea name="comment" id="comment" rows="3" cols="25"></textarea>
        
        <br>
        <label for="file"> File: </label>
        <input type="file" id="file" accept="image/png, image/jpeg">
        <br>
        <input type="submit">
        <input type="reset">

    </form>

    



</body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8">
        <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="{{ url_for('static', filename='Image/Icon.png') }}">
        <img id="Logo" src="{{ url_for('static', filename='Image/Logos.png') }}">
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>

        <input id="searchInput">
        <ul id="itemList">
            {% for item in expenses %}
                <li>{{ item.expense }}</li>
            {% endfor %}
        </ul>

        {% block head %}{% endblock %}  
    </head>
    <body>
        <!-- I need to remove some attributes from the parent page -->
        <div class="topnav">
            <h3>
                <ul>
                    <li><a class="nav-link" href="{{ url_for('index') }}">Dashboard</a></li>
                    <li><a class="nav-link" href="#">Transactions</a></li>
                    <li><a class="nav-link" href="#">Budgets & Goals</a></li>
                    <li><a class="nav-link" href="#">Reports</a></li>
                    <li class="Add"><a href="{{ url_for('Add') }}" class="btn">+</a></li>
                </ul>
            </h3>
        </div>

        <li>
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
        </li>
        {% block body %}{% endblock %}
        
    </body>
</html>
